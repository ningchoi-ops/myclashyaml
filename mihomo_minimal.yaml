proxy-providers:
  Airport1:
    url: 机场订阅填到这里，两端引号不要去掉，不要填写到下方链接里去！！
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
proxies:
- name: 直连
  type: direct
mixed-port: 7890
allow-lan: true
bind-address: '*'
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  skip-domain:
  - Mijia Cloud
  - +.push.apple.com
tun:
  enable: true
  stack: mixed
  dns-hijack:
  - any:53
  - tcp://any:53
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
  - rule-set:fakeipfilter_domain
  default-nameserver:
  - https://223.5.5.5/dns-query
  proxy-server-nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
proxy-groups:
- name: 🚀 默认代理
  type: select
  proxies:
  - 🇭🇰 香港节点
  - 🇯🇵 日本节点
  - 🇸🇬 狮城节点
  - 🇺🇲 美国节点
  - 🌐 全部节点
- name: 🍀 Google
  type: select
  proxies:
  - 🇭🇰 香港节点
  - 🇯🇵 日本节点
  - 🇸🇬 狮城节点
  - 🇺🇲 美国节点
  - 🌐 全部节点
- name: 👨🏿‍💻 GitHub
  type: select
  proxies:
  - 🇭🇰 香港节点
  - 🇯🇵 日本节点
  - 🇸🇬 狮城节点
  - 🇺🇲 美国节点
  - 🌐 全部节点
- name: 📲 Telegram
  type: select
  proxies:
  - 🇭🇰 香港节点
  - 🇯🇵 日本节点
  - 🇸🇬 狮城节点
  - 🇺🇲 美国节点
  - 🌐 全部节点
- name: 🐟 漏网之鱼
  type: select
  proxies:
  - 🚀 默认代理
  - 🇭🇰 香港节点
  - 🇯🇵 日本节点
  - 🇸🇬 狮城节点
  - 🇺🇲 美国节点
  - 🌐 全部节点
- name: 🇭🇰 香港节点
  type: select
  include-all: true
  filter: (?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$
- name: 🇯🇵 日本节点
  type: select
  include-all: true
  filter: (?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$
- name: 🇸🇬 狮城节点
  type: select
  include-all: true
  filter: (?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|深|美)).)*$
- name: 🇺🇲 美国节点
  type: select
  include-all: true
  filter: (?=.*(美|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$
- name: 🌐 全部节点
  type: select
  include-all: true
rules:
- RULE-SET,private_ip,直连,no-resolve
- RULE-SET,private_domain,直连
- DOMAIN-SUFFIX,qichiyu.com,🚀 默认代理
- RULE-SET,proxylite,🚀 默认代理
- RULE-SET,ai,🤖 AI 服务
- RULE-SET,github_domain,👨🏿‍💻 GitHub
- RULE-SET,google_domain,🍀 Google
- RULE-SET,apple_domain,直连
- RULE-SET,telegram_domain,📲 Telegram
- RULE-SET,apple_ip,直连
- RULE-SET,google_ip,🍀 Google
- RULE-SET,telegram_ip,📲 Telegram
- RULE-SET,geolocation-!cn,🚀 默认代理
- RULE-SET,cn_domain,直连
- RULE-SET,cn_ip,直连
- MATCH,🐟 漏网之鱼
rule-anchor:
  ip:
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs
  domain:
    type: http
    interval: 86400
    behavior: domain
    format: mrs
  class:
    type: http
    interval: 86400
    behavior: classical
    format: text
